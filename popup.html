<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标签页内容搜索</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 420px;
      min-height: 120px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶部搜索栏 ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 12px 10px;
      background: #181825;
      border-bottom: 1px solid #313244;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-icon {
      flex-shrink: 0;
      color: #89b4fa;
      font-size: 16px;
    }

    #searchInput {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 14px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    #searchInput:focus {
      border-color: #89b4fa;
    }

    #searchInput::placeholder {
      color: #6c7086;
    }

    #clearBtn {
      background: transparent;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    #clearBtn:hover {
      color: #f38ba8;
      background: #313244;
    }

    /* ── 状态栏 ── */
    .status-bar {
      padding: 6px 12px;
      font-size: 12px;
      color: #6c7086;
      min-height: 26px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar.has-results {
      color: #a6e3a1;
    }

    .status-bar.no-results {
      color: #f38ba8;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #45475a;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 结果列表 ── */
    #results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 8px;
    }

    #results::-webkit-scrollbar {
      width: 5px;
    }

    #results::-webkit-scrollbar-track {
      background: transparent;
    }

    #results::-webkit-scrollbar-thumb {
      background: #45475a;
      border-radius: 4px;
    }

    .tab-card {
      margin: 4px 8px;
      border-radius: 8px;
      background: #24273a;
      border: 1px solid #313244;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .tab-card:hover {
      border-color: #89b4fa;
    }

    .tab-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .tab-favicon-placeholder {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      background: #45475a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #6c7086;
    }

    .tab-title {
      flex: 1;
      font-weight: 600;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }

    .tab-count {
      background: #89b4fa;
      color: #1e1e2e;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .tab-toggle {
      color: #6c7086;
      font-size: 11px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .tab-card.expanded .tab-toggle {
      transform: rotate(180deg);
    }

    .tab-snippets {
      display: none;
      padding: 0 10px 8px;
      border-top: 1px solid #313244;
    }

    .tab-card.expanded .tab-snippets {
      display: block;
    }

    .tab-url {
      font-size: 11px;
      color: #6c7086;
      margin: 6px 0 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .snippet {
      background: #1e1e2e;
      border-left: 3px solid #89b4fa;
      border-radius: 0 4px 4px 0;
      padding: 4px 8px;
      margin: 4px 0;
      font-size: 12px;
      color: #a6adc8;
      line-height: 1.6;
      word-break: break-word;
    }

    .snippet mark {
      background: #f9e2af;
      color: #1e1e2e;
      border-radius: 2px;
      padding: 0 1px;
      font-weight: 700;
    }

    .focus-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 5px;
      background: #313244;
      color: #89b4fa;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .focus-btn:hover {
      background: #45475a;
    }

    /* ── 空态 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: #6c7086;
      gap: 8px;
    }

    .empty-state .icon {
      font-size: 36px;
    }

    .empty-state p {
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- 搜索栏 -->
<div class="search-bar">
  <span class="search-icon">🔍</span>
  <input
    type="text"
    id="searchInput"
    placeholder="搜索所有标签页内容…"
    autocomplete="off"
    spellcheck="false"
  />
  <button id="clearBtn" title="清除搜索与高亮">✕</button>
</div>

<!-- 状态栏 -->
<div class="status-bar" id="statusBar">
  <span id="statusText">输入关键词开始搜索</span>
</div>

<!-- 结果 -->
<div id="results"></div>

<script src="browser-polyfill.js"></script>
<script src="popup.js"></script>
</body>
</html>
